name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    name: Gateway
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --filter=@gaucho/gateway...

      - name: Lint
        run: pnpm turbo lint --filter=@gaucho/gateway

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@gaucho/gateway

      - name: Test
        run: pnpm turbo test --filter=@gaucho/gateway

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --filter=@gaucho/mobile...

      - name: Lint
        run: pnpm turbo lint --filter=@gaucho/mobile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@gaucho/mobile

      - name: Test
        run: pnpm turbo test --filter=@gaucho/mobile
